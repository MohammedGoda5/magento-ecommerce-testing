name: Magento E-Commerce Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge

env:
  MAVEN_OPTS: "-Xmx2g -XX:+UseG1GC"

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    
    - uses: browser-actions/setup-chrome@latest
    
    - name: Health Check
      run: |
        for i in {1..3}; do
          curl -sf --max-time 10 https://magento.softwaretestingboard.com && exit 0
          sleep 5
        done
        exit 1

    - name: Compile
      run: mvn clean compile -q

    - name: Run Smoke Test (AddToCartTest only)
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          mvn test -Dtest=AddToCartTest -Dheadless=true
      timeout-minutes: 10

  full-regression:
    name: Full Regression Test Suite
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    
    - uses: browser-actions/setup-chrome@latest
    
    - name: Health Check
      run: |
        for i in {1..3}; do
          curl -sf --max-time 10 https://magento.softwaretestingboard.com && exit 0
          sleep 5
        done
        exit 1

    - name: Run All Tests
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          mvn clean test -Dheadless=true
      timeout-minutes: 20
      continue-on-error: true

    - name: Install Allure
      run: |
        wget -q https://github.com/allure-framework/allure2/releases/download/2.34.0/allure-2.34.0.tgz
        tar -xzf allure-2.34.0.tgz
        sudo mv allure-2.34.0 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

    - name: Generate Allure Report
      run: allure generate target/allure-results --clean -o target/allure-report
      if: always()

    - name: Upload Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          target/allure-results/
          target/allure-report/
          target/surefire-reports/
        retention-days: 30

    - name: Test Summary
      if: always()
      run: |
        echo "## Test Results" >> $GITHUB_STEP_SUMMARY
        if [ -f target/surefire-reports/testng-results.xml ]; then
          TOTAL=$(grep -oP 'total="\K[0-9]+' target/surefire-reports/testng-results.xml || echo "0")
          PASSED=$(grep -oP 'passed="\K[0-9]+' target/surefire-reports/testng-results.xml || echo "0")
          FAILED=$(grep -oP 'failed="\K[0-9]+' target/surefire-reports/testng-results.xml || echo "0")
          echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
        fi
